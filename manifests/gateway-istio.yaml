# The Gateway the LLM traffic enters through. gatewayClassName=istio is
# served by the istiod we install with ENABLE_GATEWAY_API_INFERENCE_EXTENSION=true,
# which teaches Istio to call the Endpoint-Picker (ext-proc) for InferencePool
# backends. Istio materialises a Service named "<name>-istio" that we port-forward.
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: inference-gateway
  annotations:
    # kind has no cloud load-balancer, so a LoadBalancer Service stays
    # <pending> forever and the Gateway never goes Programmed. Tell Istio to
    # back this Gateway with a ClusterIP Service instead — it always gets an
    # address (so Programmed=True), and we reach it via port-forward anyway.
    networking.istio.io/service-type: ClusterIP
spec:
  gatewayClassName: istio
  listeners:
    - name: http
      port: 80
      protocol: HTTP
