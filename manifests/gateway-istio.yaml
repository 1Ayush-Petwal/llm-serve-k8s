# The Gateway the LLM traffic enters through. gatewayClassName=istio is
# served by the istiod we install with ENABLE_GATEWAY_API_INFERENCE_EXTENSION=true,
# which teaches Istio to call the Endpoint-Picker (ext-proc) for InferencePool
# backends. Istio materialises a Service named "<name>-istio" that we port-forward.
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: inference-gateway
spec:
  gatewayClassName: istio
  listeners:
    - name: http
      port: 80
      protocol: HTTP
