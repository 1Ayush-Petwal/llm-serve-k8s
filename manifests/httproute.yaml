# Routes all traffic on the Gateway to the InferencePool. The backendRef kind is
# InferencePool (not Service) — Istio hands the request to the Endpoint-Picker,
# which chooses the actual backend pod. That indirection is exactly what makes
# the vLLM<->SGLang swap invisible to the client.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: llm-route
spec:
  parentRefs:
    - name: inference-gateway
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - group: inference.networking.k8s.io
          kind: InferencePool
          name: ${POOL_NAME}
